# Preserve X-Forwarded-Proto from upstream host-level nginx (https)
# instead of overwriting with $scheme (http, since this container listens on 80).
# Falls back to $scheme when accessed directly (local dev).
map $http_x_forwarded_proto $real_x_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
  listen 80;

  root /usr/share/nginx/html;
  index NOC-configMaker.html;

  # Friendly routes (match Flask behavior)
  location = / {
    try_files /NOC-configMaker.html =404;
  }

  location = /app {
    try_files /NOC-configMaker.html =404;
  }

  location = /tool {
    try_files /NOC-configMaker.html =404;
  }

  # OMNI deep-link alias for this tool
  location = /l {
    try_files /NOC-configMaker.html =404;
  }

  location = /l/ {
    try_files /NOC-configMaker.html =404;
  }

  location = /login {
    return 302 /login.html;
  }

  location = /change-password {
    return 302 /change-password.html;
  }

  location ~* \.html$ {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    add_header Pragma "no-cache";
    expires -1;
  }

  location / {
    try_files $uri $uri/ /NOC-configMaker.html;
  }

  # OAuth2 callback – must reach Flask backend (not served as static file)
  location /auth/callback {
    proxy_pass http://backend:5000/auth/callback;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $real_x_forwarded_proto;
  }

  location /api/ {
    proxy_pass http://backend:5000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $real_x_forwarded_proto;
    proxy_read_timeout 300;
    proxy_connect_timeout 30;
    proxy_send_timeout 120;
    client_max_body_size 10m;
  }

  # Aviat SSE log stream (disable buffering)
  location /api/aviat/stream/ {
    proxy_pass http://backend:5000/api/aviat/stream/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $real_x_forwarded_proto;
    proxy_buffering off;
    proxy_read_timeout 3600;
  }
}
